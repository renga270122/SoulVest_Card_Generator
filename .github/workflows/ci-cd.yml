name: CI/CD for Streamlit App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run tests (if any)
        run: |
          if [ -f tests/test_app.py ]; then python -m unittest discover -s tests; else echo "No tests found."; fi
      # Deployment step for Streamlit Community Cloud is manual via GitHub integration
      - name: CI completed
        run: echo "CI pipeline finished. Deploy via Streamlit Community Cloud GitHub integration."
